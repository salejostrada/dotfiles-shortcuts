bind = SUPER, A, exec, alacritty
bind = SUPER, B, exec, librewolf
bind = SUPER, C, exec,pkill rofi ||cliphist list | rofi -dmenu -display-columns 2 -theme ~/.config/rofi/clipboard.rasi | cliphist decode | wl-copy
bind = SUPER, D, exec, kdeconnect-app
bind = SUPER, E, exec, kitty -e bluetui
bind = SUPER, F, fullscreen, 1
bind = SUPER, G, exec, kitty -e btop
bind = SUPER, H, movefocus, l
bind = SUPER, I, workspace, e+1
bind = SUPER, J, movefocus, d
bind = SUPER, K, movefocus, u
bind = SUPER, L, movefocus, r
bind = SUPER, M, exec, Telegram
bind = SUPER, N, exec, kitty -e yazi
bind = SUPER, O, exec, notify-send "Hyprland doesn't have an overview feature"
bind = SUPER, P, exec, quickshell -p ~/.config/quickshell/power_menu # pkill wlogout || wlogout
bind = SUPER, Q, killactive,
bind = SUPER, R, exec, pkill waybar || waybar -c $HOME/.config/waybar/Hyprland/config.jsonc -s $HOME/.config/waybar/style.css
bind = SUPER, S, exec, sh -c 'brave -new-window || brave-origin-beta https://www.youtube.com'
bind = SUPER, T, exec, kitty
bind = SUPER, U, workspace, e-1
bind = SUPER, V, togglefloating,
bind = SUPER, W, exec, bash $HOME/.config/Scripts/random_wall_on_home.sh
bind = SUPER, X, exec, kitty -e cmus
bind = SUPER, Y, exec, kitty -e nmtui
bind = SUPER, Z, exec, localsend

bind = SUPER, Space, exec, pkill rofi || rofi -show drun -theme ~/.config/rofi/launchpad.rasi
bind = SUPER, Delete, exec, cliphist wipe
bind = SUPER, Grave, layoutmsg, swapwithmaster

bind = SUPER ALT, B, exec, brave-origin-beta

bind = ALT, F, fullscreen,
bind = ALT, M, fullscreen, 0
bind = SUPER CTRL, E, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bindl = SUPER CTRL, R, exec, bash ~/.config/Scripts/partial_screenshot.sh
bindl = SUPER CTRL, S, exec, bash ~/.config/Scripts/full_screenshot.sh
bindl = SUPER SHIFT, R, exec, bash ~/.config/Scripts/screen_recorder.sh

bind = ALT, L, exec, bash ~/.config/Scripts/random_wall_on_lockscr.sh
bind = ALT, W, exec, pkill rofi || bash ~/.config/Scripts/wallpaper_switcher.sh
bindl = ALT, Z, exec, hyprctl reload
bindl = ALT, O, exec, systemctl poweroff
bindl = ALT, R, exec, systemctl reboot
bindl = ALT, S, exec, systemctl suspend ; bash ~/.config/Scripts/random_wall_on_lockscr.sh
bindel = ALT,BracketRight, exec, wpctl set-volume -l 1.2 @DEFAULT_AUDIO_SINK@ 10%+
bindel = ALT,BracketLeft, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 10%-
bindel = ALT,slash, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ALT,backslash, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ALT,apostrophe, exec, brightnessctl set 10%+
bindel = ALT,semicolon, exec, brightnessctl set 10%-
bindel = ALT,Period, exec, bash ~/.config/Scripts/full_screenshot.sh
bindel = ALT,Comma, exec, bash ~/.config/Scripts/partial_screenshot.sh

bind = SUPER, left, movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up, workspace, e-1
bind = SUPER, down, workspace, e+1

bind = SUPER SHIFT, h, swapwindow, l 
bind = SUPER SHIFT, l, swapwindow, r 
bind = SUPER SHIFT, k, swapwindow, u 
bind = SUPER SHIFT, j, swapwindow, d 

bind = SUPER SHIFT, left,  swapwindow, l
bind = SUPER SHIFT, right, swapwindow, r
bind = SUPER SHIFT, up,    swapwindow, u
bind = SUPER SHIFT, down,  swapwindow, d

bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9

bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9

bind = ALT, space, togglespecialworkspace, terminal
bind = SUPER SHIFT, space, movetoworkspace

bind = SUPER, mouse_up, workspace, e+1
bind = SUPER, mouse_down, workspace, e-1
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.2 @DEFAULT_AUDIO_SINK@ 10%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 10%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl set 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl set 10%-
bindel = ,XF86Lock, exec, bash ~/.config/Scripts/random_wall_on_lockscr.sh

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

bindl = ,Print, exec, bash ~/.config/Scripts/full_screenshot.sh
bindl = ALT, Print, exec, bash ~/.config/Scripts/partial_screenshot.sh
bindl = CTRL, Print, exec, bash ~/.config/Scripts/screen_recorder.sh
