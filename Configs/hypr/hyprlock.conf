background {
    path = screenshot #~/.cache/hyprlock_wall.png
    blur_passes = 4
    blur_size = 6
    contrast = 1.4
    noise = 0.02
    brightness = 0.7
    vibrancy = 0.6
}

general { }

input-field {
    monitor =
    size = 200, 35
    outline_thickness = 2
    dots_size = 0.3
    dots_spacing = 0.4
    dots_center = true
    outer_color = rgba(250, 250, 250, 0.3)
    inner_color = rgba(250, 250, 250, 0.2)
    font_color = rgb(250, 250, 250)
    fade_on_empty = false
    font_family = Google Sans Flex Medium
    placeholder_text = Enter password... 
    fail_text = $PAMFAIL
    hide_input = false
    position = 0, -360
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"─── %H:%M ───")</span>"
    color = rgba(250, 250, 250, 1.0)
    font_size = 100
    font_family = Google Sans Flex Bold
    position = 0, 100
    halign = center
    valign = center
}

label {
    text = cmd[update:1000] bash ~/.config/Scripts/lockscr_greet.sh
    color = rgb(250, 250, 250)
    font_size = 120
    font_family = Betterlett
    position = 0, 300
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %d %B %Y")"
    color = rgba(250, 250, 250, 1.0)
    font_size = 34
    font_family = Google Sans Flex Bold
    position = 0,-20
    halign = center
    valign = center
}

image {
    monitor =
    path = ~/.config/Resources/images/red_dots.png
    size = 1080 
    rounding = 1
    position = 0,0
    halign = center
    valign = center
}


image {
    monitor =
    path = ~/.config/Resources/images/PFP.jpg
    color = rgba(250, 250, 250, 1.0)
    border_size = 2
    size = 100
    rounding = -1
    rotate = 0
    reload_time = -1
    reload_cmd = 
    position = 0, -180
    halign = center
    valign = center
}

label {
    monitor =
    text = Hello, $USER
    color = rgba(250, 250, 250, 1.0)
    font_size = 30
    font_family = Google Sans Flex Medium
    position = 0, -280
    halign = center
    valign = center
}
