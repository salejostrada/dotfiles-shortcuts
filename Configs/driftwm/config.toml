# Mouse bindings: "Modifier+...+Trigger" = "action"
# Context-aware: on-window, on-canvas, anywhere.
# Specific context checked first, then "anywhere" as fallback.
# Click-to-focus and SSD decoration clicks are always hardcoded.
# Triggers: left, right, middle (buttons), trackpad-scroll, wheel-scroll
# Merges with defaults. Use "none" to unbind.
#
# Mouse actions: move-window, move-snapped-windows, resize-window,
# resize-window-snapped, pan-viewport, zoom, center-nearest
# Any keyboard action also works for button triggers: exec, close-window, toggle-fullscreen, etc.
#
# move-window / resize-window act on the focused window only.
# move-snapped-windows / resize-window-snapped also translate every window
# connected to the focused one via snap adjacency

[mouse]
# When true, resizing a window by dragging its edge (SSD or CSD border)
# propagates to every window connected to it via snap adjacency.
# Keybinding/gesture resize is unaffected — bind `resize-window-snapped`
# explicitly if you want cluster-aware resize there too.
# decoration_resize_snapped = false

# When true, maximize/unmaximize initiated via window decoration (CSD maximize
# button, SSD title-bar double-click, or xdg/foreign-toplevel set_maximized)
# propagates to every window connected via snap adjacency.
# Keybinding/gesture fit is unaffected — bind `fit-window-snapped` explicitly
# if you want cluster-aware fit there too.
# decoration_fit_snapped = false

[mouse.on-window]
# "alt+left" = "move-window"
# "alt+shift+left" = "move-snapped-windows"
# "alt+right" = "resize-window"
# "alt+shift+right" = "resize-window-snapped"
# "alt+middle" = "fit-window"
# "alt+shift+middle" = "fit-window-snapped"
# "mod+middle" = "toggle-fullscreen"

[mouse.on-canvas]
# "left" = "pan-viewport"            # unmodified left-click on empty canvas → pan
# "trackpad-scroll" = "pan-viewport" # trackpad scroll on empty canvas → pan
# "wheel-scroll" = "zoom"            # mouse wheel on empty canvas → zoom

[mouse.anywhere]
# "mod+left" = "pan-viewport"
# "mod+ctrl+left" = "center-nearest" # direction from drag delta
# "mod+trackpad-scroll" = "pan-viewport"
# "mod+wheel-scroll" = "zoom"

# Gesture bindings: "Modifier+N-finger-<type>" = "action"
# Context-aware: on-window, on-canvas, anywhere.
# Unbound gestures are forwarded to the focused app.
# "none" unbinds (prevents anywhere fallback, still forwards).
#
# Gesture types:
#   N-finger-swipe            — continuous OR threshold (action determines behavior)
#   N-finger-swipe-up/down/left/right — threshold only, checked before swipe fallback
#   3-finger-doubletap-swipe  — continuous OR threshold (3-finger tap then swipe)
#   N-finger-pinch            — continuous only (use pinch-in/out for discrete)
#   N-finger-pinch-in/out     — threshold only
#   N-finger-hold             — threshold only (fires on release)
#
# Continuous actions: pan-viewport, zoom, move-window, resize-window, resize-window-snapped
# Threshold actions: center-nearest, center-window, home-toggle, zoom-to-fit, zoom-to-fit-snapped, fit-window, fit-window-snapped, exec <cmd>, etc.

# Gesture thresholds — tune for your touchpad size.
[gestures]
# swipe_threshold = 12.0        # px cumulative distance before directional swipe fires
# pinch_in_threshold = 0.85     # scale below which pinch-in fires (1.0 = no pinch)
# pinch_out_threshold = 1.15    # scale above which pinch-out fires (1.0 = no pinch)

[gestures.on-window]
# "alt+3-finger-swipe" = "resize-window"
# "alt+shift+3-finger-swipe" = "resize-window-snapped"
# "3-finger-doubletap-swipe" = "move-window"
# "alt+2-finger-pinch-in" = "fit-window"
# "alt+2-finger-pinch-out" = "fit-window"
# "alt+shift+2-finger-pinch-in" = "fit-window-snapped"
# "alt+shift+2-finger-pinch-out" = "fit-window-snapped"
# "alt+3-finger-pinch-in" = "toggle-fullscreen"
# "alt+3-finger-pinch-out" = "toggle-fullscreen"

[gestures.on-canvas]
# "2-finger-pinch" = "zoom"

[gestures.anywhere]
# "3-finger-swipe" = "pan-viewport"         # continuous (per-frame dx/dy)
# "4-finger-swipe" = "center-nearest"       # threshold (accumulate, detect direction, fire once)
# "mod+3-finger-swipe" = "center-nearest"   # mod makes 3-finger swipe navigate too
# Per-direction overrides examples (threshold only, checked before swipe fallback):
# # "4-finger-swipe-up" = "exec brightnessctl set +5%"
# # "4-finger-swipe-down" = "exec brightnessctl set 5%-"
# "mod+2-finger-pinch" = "zoom"             # mod overrides app forwarding
# "3-finger-pinch" = "zoom"                 # continuous
# "4-finger-pinch-in" = "zoom-to-fit"       # threshold
# "mod+4-finger-pinch-in" = "zoom-to-fit-snapped"
# "4-finger-pinch-out" = "home-toggle"      # threshold
# "mod+3-finger-pinch-in" = "zoom-to-fit"
# "mod+3-finger-pinch-out" = "home-toggle"
# "4-finger-hold" = "center-window"         # fires on release
# "mod+3-finger-hold" = "center-window"

# X11 support via xwayland-satellite. driftwm spawns satellite eagerly at
# startup, exports DISPLAY=:N, and X11 apps connect transparently. If the
# binary isn't found, X11 support is disabled with a warning; everything
# else still runs.
#
# [xwayland]
# enabled = true                  # default: true
# path    = "xwayland-satellite"  # path to xwayland-satellite binary ($PATH lookup works)

# Per-output configuration. Each [[outputs]] entry matches by connector name.
# Find connector names with wlr-randr or check driftwm logs at startup.
# Outputs without a matching entry default to scale 1.0.
# Winit backend ignores [[outputs]] entries.
#
# Examples:
# # [[outputs]]
# # name = "eDP-1"           # connector name (required)
# # scale = 1.5              # fractional scale (default: 1.0)
# # transform = "normal"     # normal, 90, 180, 270, flipped, flipped-90, flipped-180, flipped-270
# # position = "auto"        # "auto" (left-to-right) or [x, y] in layout coords
# # mode = "preferred"       # "preferred", "1920x1080", or "2560x1440@144"
# #
# # [[outputs]]
# # name = "HDMI-A-1"
# # scale = 1.0
# # mode = "1920x1080@60"

# Window rules: match windows and apply per-window overrides.
# ALL matching rules are merged in config order (later rules override earlier
# ones for scalar fields; boolean flags are sticky-on). This lets you compose
# rules — e.g. one rule sets blur=true, a later one adds opacity=0.85.
#
# Match criteria (at least one required; all specified must match):
#   app_id     — Wayland app_id. X11 apps proxied via xwayland-satellite arrive
#                with app_id set from WM_CLASS instance (typically lowercase).
#   title      — window title
#
# Pattern syntax (applies to all match fields):
#   Plain string  — exact match: "kitty"
#   Glob          — * wildcard:  "steam_app_*"
#   Regex         — wrap in /…/: "/^steam_app_\\d+$/"
#
# To find a window's identifiers, run while the window is open:
#   cat $XDG_RUNTIME_DIR/driftwm/state   (see the "windows=" line)
#
# Effect fields:
#   position   — [x, y] coordinates (window center, Y-up). Canvas coords, or
#                output-relative (origin = output center) when pinned_to_screen.
#   size       — [width, height] initial window dimensions (one-shot; user/app can resize after)
#   widget     — true: pinned (immovable), below normal windows, excluded from
#                navigation and alt-tab (default: false)
#   pinned_to_screen — true: lock the window to the output's screen space —
#                ignores pan/zoom, floats above normal windows (PiP, toolbars).
#                `position` becomes output-relative; movable unless widget = true.
#                Toggle live with `toggle-pin-to-screen` (Mod+T). (default: false)
#   decoration — overrides [decorations] default_mode for matched windows.
#                Omit to inherit default_mode. Values:
#                "client":  CSD — client's own titlebar
#                "server":  SSD — driftwm's titlebar
#                "minimal": SSD — no titlebar, just shadow + corners + border
#                            (this is the mode for chrome-on-borderless widgets;
#                            border_width / corner_radius / shadow rules apply)
#                "none":    bare client surface — compositor adds zero chrome,
#                            and per-window border_width / corner_radius /
#                            shadow rules are ignored. Use "minimal" if you
#                            want chrome without a titlebar.
#   blur       — true: blur background behind this window (default: false)
#   opacity    — 0.0–1.0: window transparency (default: 1.0, fully opaque)
#   border_width         — per-window border width override (px). Set to 0 to
#                          disable border on a window even when [decorations]
#                          border_width > 0. Ignored for decoration = "none".
#   border_color         — per-window unfocused border color hex (e.g. "#5c5c5c").
#   border_color_focused — per-window focused border color hex.
#   corner_radius        — per-window corner radius override (px). Affects
#                          content clip, border shape, and shadow. Ignored for
#                          decoration = "none".
#   shadow               — per-window shadow toggle. Overrides [decorations]
#                          shadow. Ignored for decoration = "none".
#   pass_keys  — controls which compositor keybindings are forwarded to the app:
#                  pass_keys = true           → forward ALL keys (game-friendly)
#                  pass_keys = ["mod+q",      → forward ONLY these combos; all other
#                               "ctrl+q"]       compositor shortcuts stay active
#                  pass_keys = false / omit   → compositor handles everything (default)
#                VT switching (Ctrl+Alt+F1–F12) always stays in the compositor.
#
# Layer-shell surfaces (panels, notifications, bars like waybar):
#   `decoration` is ignored — layers have no decoration mode. Chrome
#   (border_width, corner_radius, shadow) is field-by-field opt-in on the rule
#   and does NOT inherit from [decorations]. Without explicit values on the
#   rule, a layer surface has no border, no shadow, and no corner clip.
#
# Examples:
#
# # Desktop widget (pinned clock/calendar)
# # [[window_rules]]
# # app_id     = "my-widget"
# # position   = [0, 0]
# # widget     = true
# # decoration = "none"
#
# # Picture-in-Picture: pinned to the screen, stays put while you pan/zoom.
# # Movable/resizable; drop `position` to center it on the active output.
# # [[window_rules]]
# # title            = "Picture-in-Picture"
# # pinned_to_screen = true
# # position         = [0, -300]   # output-relative: 300px below center
#
# # Blurred transparent terminal
# # [[window_rules]]
# # app_id  = "kitty"
# # opacity = 0.85
# # blur    = true
#
# # Game: pass ALL keys to the app (mod+q, ctrl+q etc. reach the game)
# # [[window_rules]]
# # app_id    = "steam_app_*"
# # pass_keys = true
#
# # Game: only let ctrl+q through, keep everything else (mod+q still closes)
# # [[window_rules]]
# # app_id    = "factorio"
# # pass_keys = ["ctrl+q"]
#
# # Regex match: any Steam game app
# # [[window_rules]]
# # app_id    = "/^steam_app_\\d+$/"
# # pass_keys = true
#
# # Compose rules: blur from first rule, opacity from second (both apply)
# # [[window_rules]]
# # app_id = "Alacritty"
# # blur   = true
#
# # [[window_rules]]
# # app_id  = "Alacritty"
# # opacity = 0.9
#
# # Iced/libcosmic utility windows that share the main window's app_id
# # [[window_rules]]
# # title  = "winit window"
# # widget = true

[[window_rules]]
  app_id = "logout_dialog"
  blur = true

[[window_rules]]
  app_id = "rofi"
  blur = true

[[window_rules]]
  app_id = "kitty"
  blur = true
