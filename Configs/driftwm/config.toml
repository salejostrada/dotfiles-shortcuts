# driftwm configuration

# This file documents all built-in defaults.
#
# Every commented line below is already active. Uncomment a line only
# to override its value. Lines under a "# Example:" header are illustrative
# alternatives (double-commented: `# # key = ...`) — not defaults.
#
# To customize: copy to ~/.config/driftwm/config.toml and edit only the
# lines you want to change. Missing fields use built-in defaults.
# For bindings, use `= "none"` to remove a default entirely.
# Validate with: driftwm --check-config

# Window manager modifier key: "super" (default) or "alt"
mod_key = "super"

autostart = [
  "kdeconnect-indicator",
  "kdeconnectd",
  "/usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1 &",
  "systemd-run --user --no-block --collect --unit=fix-portal-env bash -c sleep 2 && systemctl --user import-environment WAYLAND_DISPLAY && systemctl --user restart xdg-desktop-portal-gtk xdg-desktop-portal",
  "wl-paste --type image --watch cliphist store",
  "wl-paste --type text --watch cliphist store",
  "waybar -c $HOME/.config/waybar/DriftWM/config.jsonc -s $HOME/.config/waybar/DriftWM/style.css",
  "mako",
  "foot --server",
]

# Sloppy focus: keyboard focus follows the pointer to windows.
# Moving to empty canvas keeps focus; click empty canvas to unfocus.
focus_follows_mouse = true

# Where new windows spawn when no window rule positions them:
#   "center" (default) — viewport center; camera animates to the new window.
#   "cursor"           — centered on the cursor (clamped to the active output's
#                        usable area); camera stays put unless zoomed out and
#                        zoom.reset_on_new_window is true.
#   "auto"             — snap-place adjacent to the focused window's cluster:
#                        try focused's edges (clockwise from the one nearest
#                        the viewport center), then BFS to neighbors. Falls
#                        back to "center" when no focused window or no valid
#                        placement was found.
window_placement = "auto"

# Commands to run at startup (after WAYLAND_DISPLAY is set).
# Each entry is passed to sh -c, so full shell syntax works (pipes, &&, env vars).
# autostart = []
#
# Running driftwm as a systemd session (via driftwm-session / a display manager)
# also launches XDG autostart entries (~/.config/autostart, /etc/xdg/autostart),
# in addition to the autostart list above. To opt out:
#   systemctl --user mask xdg-desktop-autostart.target

# Environment variables set before any clients launch.
# Child processes (autostart, exec bindings) inherit these.
# These override the compositor's built-in toolkit defaults
# (MOZ_ENABLE_WAYLAND, QT_QPA_PLATFORM, SDL_VIDEODRIVER, GDK_BACKEND, ELECTRON_OZONE_PLATFORM_HINT).
[env]
# Examples:
# QT_WAYLAND_DISABLE_WINDOWDECORATION = "1"
MOZ_ENABLE_WAYLAND = "1"

[input.keyboard]
layout = "us"              # XKB layout (e.g., "us,ru" for multi-layout)
# variant = ""               # XKB variant (e.g., "dvorak", or "," for two defaults)
# options = ""               # XKB options (e.g., "grp:win_space_toggle" for Super+Space layout switch)
# model = ""                 # XKB model (e.g., "pc105")
repeat_rate = 100            # keys/sec
repeat_delay = 300           # ms before repeat starts
# layout_independent = true  # match bindings by physical key position across layouts
num_lock = false             # num lock state on startup
# caps_lock = false          # caps lock state on startup

[input.trackpad]
# tap_to_click = true         # enable tap-to-click
natural_scroll = true         # reverse scroll direction (content follows fingers)
# tap_and_drag = true         # double-tap-hold to drag
# accel_speed = 0.0           # pointer acceleration (-1.0 to 1.0)
# accel_profile = "adaptive"  # "flat" or "adaptive"
# click_method = "none"       # none = device default; clickfinger = finger count (1=left, 2=right, 3=middle); button_areas = position on trackpad
# disable_while_typing = true  # ignore trackpad input shortly after a key press (palm rejection)

[input.mouse]
accel_speed = 1.0           # pointer acceleration (-1.0 to 1.0)
accel_profile = "adaptive"      # "flat" or "adaptive"
natural_scroll = false      # reverse scroll direction

[cursor]
theme = "Bibata-Modern-Ice"
size = 24                   # sets XCURSOR_SIZE
# inactive_opacity = 0.5      # cursor opacity on non-active outputs (0.0–1.0)

[navigation]
trackpad_speed = 1.5        # trackpad (scroll/gestures) pan multiplier
mouse_speed = 1.5           # mouse (drag) pan multiplier (1.0 = direct)
drift = 0.5                   # momentum decay (0.90=snappy, 0.98=floaty)
animation_speed = 0.3       # camera lerp factor (higher = faster)
auto_navigate_on_close = true  # on close, pan to the newly focused window if off-screen
nudge_step = 60             # px per nudge-window action (mod-shift-arrow by default)
pan_step = 100.0            # px per pan-viewport action (mod-ctrl-arrow by default)
# Anchors: canvas points discoverable by center-nearest (4-finger swipe / Mod+Arrow)
# even when no window is there. Uses Y-up coordinate system.
# anchors = [[0, 0]]
# Example with 4 corners:
# # anchors = [[0, 0], [-1750, 1750], [1750, 1750], [1750, -1750], [-1750, -1750]]

[navigation.edge_pan]
# zone = 100.0                # activation zone width (px from viewport edge)
# speed_min = 4.0             # px/frame at zone boundary
speed_max = 20.0            # px/frame at viewport edge
# cursor_pan = false          # pan when the bare cursor touches a screen edge
#                             # (not just while dragging). Toggle: "toggle-cursor-pan".
# cursor_zone = 20.0          # cursor edge-pan activation zone (px) — kept small
#                             # so it doesn't trigger by accident.
#                             # Pans at a constant speed_max within the zone (steady,
#                             # push-speed independent); speed_min is unused here.

[zoom]
# step = 1.2                  # multiplier per keypress (1.1 = 10% per press)
# fit_padding = 80.0          # viewport px padding for zoom-to-fit (screen space)
# reset_on_new_window = true  # animate zoom to 1.0 when a new window is mapped
#                             # (false = keep current zoom, pan only)
# reset_on_activation = true  # animate zoom to 1.0 when an off-screen window
#                             # requests focus
#                             # (false = keep current zoom, pan only)

[snap]
enabled = true               # magnetic edge snapping during window drag
gap = 60.0                   # gap between snapped windows (canvas px)
distance = 40.0              # activation threshold (screen px from edge)
break_force = 40.0           # screen px past snap to break free
# same_edge = false            # also snap same edges (left-to-left, top-to-top)
# edge_center = false          # also snap edge midpoints (centers align along the moved axis)

[decorations]
bg_color = "#000000"           # title bar background (default: dark gray)
fg_color = "#FFFFFF"           # title text + close button × color (default: white)
corner_radius = 32             # clip window corners to this radius
# shadow = true                  # drop shadow under window chrome

# SSD title bar text. The font is resolved via fontconfig — install the
# `adwaita-fonts` package for the default look; otherwise a generic sans is
# substituted.
title_bar_height = 30          # SSD title bar height in px (default: 25)
font = "Google Sans Flex"          # title text font family
font_size = 11                 # title text size in points (default: 11)
font_weight = "medium"         # thin/extralight/light/regular/medium/
                                 # semibold/bold/extrabold/black (default: medium)
# title_align = "center"         # "left" or "center" (default: center). "center"
                                 # centers short titles and left-aligns +
                                 # ellipsizes long ones

default_mode = "minimal"        # decoration mode for windows without a rule.
                                 # "client":  CSD — client draws its own titlebar (default)
                                 # "minimal": SSD — no titlebar; shadow, corners, and border
                                 #            still apply via [decorations] + per-window rules
                                 # "none":    bare client surface — compositor adds zero chrome;
                                 #            per-window border/corner/shadow rules are ignored
                                 #
                                 # "server" (driftwm titlebar) is intentionally not allowed as a
                                 # global default: many toolkits (GTK, Electron) ignore
                                 # xdg-decoration and keep drawing CSD, producing a misaligned
                                 # double titlebar. Use it per-app via [[window_rules]] instead.

# Borders apply to "client", "server", and "minimal" modes. "none" mode has
# no border unless one is set per-app in [[window_rules]].
# border_width = 0               # px; 0 disables the border
# border_color = "#303030"       # unfocused border (default: dark gray)
# border_color_focused = "#303030"  # focused border. Same default as above —
                                    # set this to a different color to get a
                                    # focus indicator.

[effects]
blur_radius = 3                # number of Kawase down+up passes (default: 2)
blur_strength = 1.0            # per-pass texel spread (default: 1.1)
# animate_blur = false           # re-blur every frame when the wallpaper is animated
                                 # (expensive; default: false — blur is captured once and
                                 # only refreshed when geometry/camera/static bg change)

[backend]
# Hardware stability quirks. All default to false (opt-in).
# Enable these if you experience flickering, crashes, or rendering issues.
# Particularly useful on NVIDIA GPUs with proprietary drivers.
# Note: These flags must be set before launching driftwm. Changing them requires a restart.
# For additional NVIDIA-specific settings, set these environment variables in your
# session wrapper script or shell profile before starting driftwm:
#   export SMITHAY_USE_LEGACY=1          # Use legacy DRM API instead of atomic modesetting
#   export __GL_GSYNC_ALLOWED=0
#   export __GL_VRR_ALLOWED=0
#   export __GL_MaxFramesAllowed=1
#   export NVD_BACKEND=direct
# wait_for_frame_completion = false  # Force GPU-fence wait before every page flip
                                     # (already done automatically when smithay reports
                                     # needs_sync — typical case on NVIDIA. Set true
                                     # only if you still see flicker after defaults.)
# disable_direct_scanout = false     # Force EGL composition (disable direct scanout)

[output]
# Global output settings. Per-output scale/transform/mode/position
# are configured in [[outputs]] sections below.

[output.outline]
# color = "#ffffff"           # outline color for other monitors' viewports
# thickness = 1               # pixels (0 to disable)
# opacity = 0.5               # 0.0–1.0

[background]
# Three background types: "shader", "tile", "wallpaper". `path` is the source.
type = "shader"
path = "~/.config/Resources/walls_for_driftwm/pink_cloud.glsl"
# Examples:
# # type = "shader" — procedural GLSL (scrolls with canvas)
# # path = "/usr/local/share/driftwm/wallpapers/animated/fast_smoke.glsl"
# # type = "tile" — image tiled across the canvas
# # path = "~/Pictures/Wallpapers/tile.png"
# # type = "wallpaper" — single image fixed to viewport (does not scroll/zoom)
# # path = "~/Pictures/Wallpapers/wallpaper.jpg"
#
# A "shader" can also sample an image via `texture` (bound to the shader's
# `tex` sampler) — a procedural effect *on* your image. See docs/shaders.md.
# # type = "shader"
# # path = "/usr/local/share/driftwm/wallpapers/textured/ripple.glsl"
# # texture = "~/Pictures/Wallpapers/photo.jpg"
#
# cache_shader = false
#   Bake a heavy static shader to a texture once, then pan that — so it pans as
#   cheaply as an image instead of recomputing every frame.
#   ONLY correct for shaders that slide rigidly with the camera: u_camera used
#   once, at full scale, as the only camera term. In GLSL:
#       vec2 canvas = v_coords * size + u_camera;   // pan shifts the image 1:1
#   Parallax (u_camera * factor) renders WRONG; animated (u_time) and
#   zoom-dependent (u_zoom) shaders are never cached and render live.
#
# cache_budget_mb = 128
#   Memory ceiling (MB) shared by cache_shader and gigapixel-TIFF wallpapers,
#   with LRU eviction. Raise it for sharper revisits on large / HiDPI displays;
#   lower it on memory-constrained machines (too low just keeps the background
#   blurrier).

# Keyboard bindings: "Modifier+...+Keysym" = "action [arg]"
# Merges with defaults. Use "none" to unbind a default binding.
# "mod" expands to mod_key. Literal modifiers: alt, super, ctrl, shift.
# Keysyms are XKB names (case-insensitive): return, tab, up, a, equal, etc.
#
# Actions:
#   exec <cmd>              — launch an app (shows loading cursor until window appears, exits fullscreen)
#   spawn <cmd>             — run a command without loading cursor and exiting fullscreen (toggles, OSD, screenshots)
#   close-window            — close the focused window
#   nudge-window <dir>      — move focused window by nudge_step px
#   pan-viewport <dir>      — pan camera by pan_step px
#   center-window           — center viewport on focused window + reset zoom
#   focus-center            — focus + center on the window under the pointer + reset zoom
#   center-nearest <dir>    — navigate to nearest window in direction
#   cycle-windows forward   — Alt-Tab style window cycling
#   cycle-windows backward  — reverse cycle
#   home-toggle             — toggle between current position and origin
#   zoom-in / zoom-out      — step zoom
#   zoom-reset              — zoom to 1.0
#   go-to <x> <y>           — jump camera to canvas position (bookmarks, Y-up)
#   zoom-to-fit             — fit all windows in viewport
#   zoom-to-fit-snapped     — fit only the focused window's snap cluster
#   toggle-fullscreen       — toggle focused window fullscreen
#   fit-window              — toggle maximize: centers + resets zoom + fills viewport; restore only resizes back
#   fit-window-snapped      — fit-window for the focused window's whole snap cluster
#   toggle-pin-to-screen    — pin/unpin the focused window to the screen (ignores pan/zoom, floats above)
#   reload-config           — hot-reload config file
#   quit                    — exit the compositor
#   send-to-output <dir>    — move focused window to adjacent output
#   switch-layout <target>  — cycle keyboard layout: next, prev, or a 0-based index
#   none                    — unbind this key combo
#
# Directions: up, down, left, right, up-left, up-right, down-left, down-right

[keybindings]
  "Mod+A" = "spawn bash $HOME/.config/Scripts/auto_detect_terminal.sh"
  "Mod+B" = "exec librewolf"
  "Mod+C" = "spawn bash $HOME/.config/Scripts/rofi_clipboard.sh"
  "Mod+D" = "exec kdeconnect-app"
  "Mod+E" = "spawn footclient --app-id bluetui -e bluetui"
  "Mod+F" = "toggle-fullscreen"
  "Mod+G" = "spawn footclient --app-id btop -e btop"
  # Mod+H "focus-column-left
  # Mod+I "focus-workspace-down
  # Mod+J "focus-window-down
  # Mod+K "focus-window-up
  # Mod+L "focus-column-right
  "Mod+M" = "exec Telegram"
  "Mod+N" = "spawn footclient --app-id yazi -e yazi"
  "Mod+O" = "zoom-to-fit"
  "Mod+P" = "spawn pkill wlogout || wlogout"
  "Mod+Q" = "close-window"
  "Mod+R" = "spawn pkill waybar || waybar -c $HOME/.config/waybar/DriftWM/config.jsonc -s $HOME/.config/waybar/DriftWM/style.css &"
  "Mod+S" = "spawn pkill helium-browser || helium-browser"
  "Mod+T" = "exec footclient"
  "Mod+W" = "none"
  "Mod+X" = "spawn footclient --app-id cmus -e cmus"
  "Mod+Y" = "spawn footclient --app-id nmtui -e nmtui"
  "Mod+Z" = "spawn pkill localsend||localsend"
  "Alt+F" = "fit-window"

  "Mod+Ctrl+R" = "spawn bash $HOME/.config/Scripts/partial_screenshot.sh"
  "Mod+Ctrl+S" = "spawn bash $HOME/.config/Scripts/full_screenshot.sh"
  "Mod+Alt+B" = "spawn helium-browser || helium-browser"
  "Mod+Alt+N" = "spawn thunar || thunar"
  "Mod+Shift+R" = "spawn bash $HOME/.config/Scripts/screen_recorder.sh"
  "Mod+Delete"= "spawn cliphist wipe && notify-send 'Clipboard cleared'"
  "Mod+Space" = "spawn pkill rofi || rofi -show drun"
  "Shift+Return" = "spawn footclient --app-id aichat -e aichat"
  "Alt+Return" = "spawn bash $HOME/.config/Scripts/dashboard_toggle.sh"
  "Mod+Return" = "spawn bash $HOME/.config/Scripts/auto_detect_terminal.sh"
  "Mod+Backslash" = "spawn bash $HOME/.config/Scripts/smassh.sh"
  "Alt+O" = "spawn systemctl poweroff"
  "Alt+R" = "spawn systemctl reboot"
  "Alt+S" = "spawn systemctl suspend ; bash ~/.config/Scripts/random_wall_on_lockscr.sh"
  "Alt+W" = "spawn pkill rofi || bash $HOME/.config/Scripts/wallpaper_switcher.sh"
  "Alt+D" = "spawn rfkill toggle all"
