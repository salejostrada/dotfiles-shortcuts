# Enabling Animations (0: disable, 1: enable)
animations=1
layer_animations=1
animation_fade_in=0
animation_fade_out=0

# Animation Type (Available types: slide, zoom, fade, none.)
animation_type_open=slide
animation_type_close=slide
layer_animation_type_open=slide
layer_animation_type_close=slide

# Fade Settings
fadein_begin_opacity=0.5
fadeout_begin_opacity=0.5

# Zoom Settings
zoom_initial_ratio=0.6
zoom_end_ratio=0.8

# Durations (in milliseconds)
animation_duration_move=440
animation_duration_open=340
animation_duration_tag=400
animation_duration_close=300
# animation_duration_focus=0

# Bezier curves
animation_curve_open=0.87, 0, 0.13, 1
animation_curve_move=0.40,1.0,0.06,1.0
animation_curve_tag=1.0,0,0.10,1.0
animation_curve_close=0.46,1.0,0.29,1.0
animation_curve_focus=0.46,1.0,0.29,0.99
animation_curve_opafadein=0.46,1.0,0.29,0.99
animation_curve_opafadeout=0.5,0.5,0.5,0.5

# Tag Animation Direction (1: horizontal, 0: vertical)
tag_animation_direction = 0
